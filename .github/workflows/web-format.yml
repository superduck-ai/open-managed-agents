name: Web Format

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-format.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-format.yml"

permissions:
  contents: read

concurrency:
  group: web-format-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check
