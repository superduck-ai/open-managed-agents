name: Sandbox base image

on:
  pull_request:
    paths:
      - "images/sandbox-base/**"
      - "scripts/sandbox-image.sh"
      - ".github/workflows/sandbox-base-image.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the verified image to GHCR"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: sandbox-base-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-contract:
    name: Source and Dockerfile contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify pinned source and version consistency
        run: ./scripts/sandbox-image.sh verify-source

      - name: Check Dockerfile
        run: ./scripts/sandbox-image.sh check

  build-test-publish:
    name: Build, verify, and optional publish
    if: github.event_name == 'workflow_dispatch'
    needs: source-contract
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REF: ghcr.io/${{ github.repository }}/sandbox-base:${{ github.sha }}
      ENVIRONMENT_MANAGER_URL: ${{ secrets.ENVIRONMENT_MANAGER_ARTIFACT_URL }}
      ENVIRONMENT_MANAGER_TOKEN: ${{ secrets.ENVIRONMENT_MANAGER_ARTIFACT_TOKEN }}
    outputs:
      image-digest: ${{ steps.identity.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download and verify Environment Manager artifact
        shell: bash
        run: |
          set -euo pipefail
          test -n "$ENVIRONMENT_MANAGER_URL" || { echo "ENVIRONMENT_MANAGER_ARTIFACT_URL secret is required" >&2; exit 1; }
          source images/sandbox-base/versions.env
          auth_args=()
          if [[ -n "$ENVIRONMENT_MANAGER_TOKEN" ]]; then
            auth_args=(-H "Authorization: Bearer $ENVIRONMENT_MANAGER_TOKEN")
          fi
          curl -fsSL --retry 5 --retry-all-errors --connect-timeout 15 "${auth_args[@]}" "$ENVIRONMENT_MANAGER_URL" -o /tmp/environment-manager
          echo "$ENVIRONMENT_MANAGER_SHA256  /tmp/environment-manager" | sha256sum --check --strict
          chmod 0755 /tmp/environment-manager

      - name: Build linux/amd64 image into the local daemon
        env:
          ENVIRONMENT_MANAGER_BINARY: /tmp/environment-manager
          SANDBOX_IMAGE_TAG: ${{ env.IMAGE_REF }}
          SANDBOX_BUILDX_CACHE_FROM: type=gha,scope=sandbox-base
          SANDBOX_BUILDX_CACHE_TO: type=gha,scope=sandbox-base,mode=max
        run: ./scripts/sandbox-image.sh build

      - name: Enforce platform, size, and runtime contracts
        run: ./scripts/sandbox-image.sh test-image "$IMAGE_REF"

      - name: Log in to GHCR
        if: inputs.publish
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the exact verified image and record its identity
        id: identity
        if: inputs.publish
        shell: bash
        run: |
          set -euo pipefail
          local_image_id="$(docker image inspect --format '{{.Id}}' "$IMAGE_REF")"
          local_descriptor_digest="$(docker image inspect "$IMAGE_REF" | jq -r '.[0].Descriptor.digest // empty')"
          [[ "$local_image_id" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "tested local image ID is invalid" >&2; exit 1; }
          docker push "$IMAGE_REF"
          docker buildx imagetools inspect --raw "$IMAGE_REF" > /tmp/sandbox-image-manifest.json
          published_config_digest="$(jq -r '.config.digest // empty' /tmp/sandbox-image-manifest.json)"
          digest="$(docker buildx imagetools inspect "$IMAGE_REF" | awk '$1 == "Digest:" { print $2; exit }')"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "published digest is missing or invalid" >&2; exit 1; }
          if [[ "$digest" != "$local_descriptor_digest" && "$published_config_digest" != "$local_image_id" ]]; then
            echo "published artifact does not match tested descriptor $local_descriptor_digest or config $local_image_id" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Published verified identity: $IMAGE_REF@$digest (local identity $local_image_id)" >> "$GITHUB_STEP_SUMMARY"

      # Deliberately no E2B Template promotion step. Deployment is a separate,
      # explicitly authorized operation that consumes the recorded digest.
