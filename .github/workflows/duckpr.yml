name: DuckPR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        required: true
      pr_url:
        type: string
        required: true
      head_sha:
        type: string
        required: true
      trigger_event:
        type: string
        required: true
      model:
        type: string
        required: true
      llm_base_url:
        type: string
        required: false
      prompt:
        type: string
        required: true

permissions:
  contents: read
  pull-requests: write
  actions: read
  checks: read

jobs:
  review:
    name: PR review (opencode)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: duckpr-${{ inputs.pr_number }}-opencode
      cancel-in-progress: true
    steps:
      - name: Validate PR head
        id: pr-context
        if: inputs.pr_number != '0' && inputs.trigger_event != 'duckpr_installation_test'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.INPUT_PR_NUMBER);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              throw new Error(`Invalid PR number: ${process.env.INPUT_PR_NUMBER}`);
            }

            const expectedHeadSha = String(process.env.INPUT_HEAD_SHA || "").trim();
            if (!/^[0-9a-f]{40}$/i.test(expectedHeadSha)) {
              throw new Error(`Invalid PR head SHA: ${expectedHeadSha || "<empty>"}`);
            }

            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pullRequest.head.sha !== expectedHeadSha) {
              throw new Error(
                `Refusing to review untrusted head SHA ${expectedHeadSha}; PR #${prNumber} currently points to ${pullRequest.head.sha}.`
              );
            }

            core.setOutput("base_ref", pullRequest.base.ref);
            core.setOutput("head_sha", pullRequest.head.sha);
            core.setOutput("title", pullRequest.title || "");
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-context.outputs.head_sha || inputs.head_sha }}
          persist-credentials: false

      - name: Checkout private Pullfrog source
        uses: actions/checkout@v6
        with:
          repository: superduck-ai/pullfrog-private
          ref: main
          token: ${{ secrets.PULLFROG_PRIVATE_REPO_TOKEN }}
          path: .duckpr/pullfrog-private
          persist-credentials: false

      - name: Hide private Pullfrog checkout from git status
        run: echo ".duckpr/" >> .git/info/exclude

      - name: Create DuckPR GitHub App token
        id: duckpr-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DUCKPR_APP_ID }}
          private-key: ${{ secrets.DUCKPR_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write
          permission-checks: read
          permission-actions: read

      - name: Run private Pullfrog review
        uses: ./.duckpr/pullfrog-private
        with:
          prompt: ${{ inputs.prompt }}
          model: ${{ inputs.model }}
          token: ${{ steps.duckpr-token.outputs.token }}
          push: disabled
        env:
          # DuckPR passes llm_base_url when it dispatches the workflow. Keep
          # Actions variable fallbacks for manual workflow_dispatch runs.
          LLM_BASE_URL: ${{ inputs.llm_base_url || vars.LLM_BASE_URL || vars.ANTHROPIC_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.ANTHROPIC_AUTH_TOKEN || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ inputs.llm_base_url || vars.LLM_BASE_URL || vars.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.LLM_API_KEY || secrets.ANTHROPIC_AUTH_TOKEN || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PULLFROG_MODEL: ${{ inputs.model }}
          PULLFROG_AGENT: opencode
          LOG_LEVEL: info
          PULLFROG_SELF_HOSTED: "1"
          PULLFROG_FORCE_LOCAL_CLI: "1"
