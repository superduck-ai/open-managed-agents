name: Large Files

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: large-files-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tracked-file-size:
    name: Tracked file size budgets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: '0.11.16'

      - name: Check tracked files
        run: ./scripts/pre-commit.sh run check-added-large-files --all-files
