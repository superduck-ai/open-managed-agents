name: Complexity

on:
  pull_request:
    paths:
      - '**/*.go'
      - '.golangci-complexity.yml'
      - 'go.mod'
      - 'go.sum'
      - 'scripts/go-complexity.sh'
      - 'web/**'
      - '.github/workflows/complexity.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - '.golangci-complexity.yml'
      - 'go.mod'
      - 'go.sum'
      - 'scripts/go-complexity.sh'
      - 'web/**'
      - '.github/workflows/complexity.yml'

permissions:
  contents: read

concurrency:
  group: complexity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-complexity:
    name: Go complexity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go complexity
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --config=.golangci-complexity.yml --timeout=5m ./...

  typescript-complexity:
    name: TypeScript complexity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check TypeScript complexity
        run: bun run lint:complexity
