name: DuckPR Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        type: string
        required: true
      pr_url:
        type: string
        required: true
      head_sha:
        type: string
        required: true
      trigger_event:
        type: string
        required: true
      model:
        type: string
        required: true
      llm_base_url:
        type: string
        required: false
      prompt:
        type: string
        required: true

permissions:
  contents: read
  pull-requests: write
  actions: read
  checks: read

jobs:
  review:
    name: PR review (${{ matrix.reviewer }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: duckpr-${{ inputs.pr_number }}-${{ matrix.reviewer }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        reviewer: [claude, opencode, ocr]
    steps:
      - name: Validate PR head
        id: pr-context
        if: inputs.pr_number != '0' && inputs.trigger_event != 'duckpr_installation_test'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.INPUT_PR_NUMBER);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              throw new Error(`Invalid PR number: ${process.env.INPUT_PR_NUMBER}`);
            }

            const expectedHeadSha = String(process.env.INPUT_HEAD_SHA || "").trim();
            if (!/^[0-9a-f]{40}$/i.test(expectedHeadSha)) {
              throw new Error(`Invalid PR head SHA: ${expectedHeadSha || "<empty>"}`);
            }

            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pullRequest.head.sha !== expectedHeadSha) {
              throw new Error(
                `Refusing to review untrusted head SHA ${expectedHeadSha}; PR #${prNumber} currently points to ${pullRequest.head.sha}.`
              );
            }

            core.setOutput("base_ref", pullRequest.base.ref);
            core.setOutput("head_sha", pullRequest.head.sha);
            core.setOutput("title", pullRequest.title || "");
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-context.outputs.head_sha || inputs.head_sha }}
          persist-credentials: false

      - name: Checkout private Pullfrog source
        if: matrix.reviewer != 'ocr'
        uses: actions/checkout@v6
        with:
          repository: superduck-ai/pullfrog-private
          ref: main
          token: ${{ secrets.PULLFROG_PRIVATE_REPO_TOKEN }}
          path: .duckpr/pullfrog-private
          persist-credentials: false

      - name: Hide private Pullfrog checkout from git status
        if: matrix.reviewer != 'ocr'
        run: echo ".duckpr/" >> .git/info/exclude

      - name: Create DuckPR GitHub App token
        id: duckpr-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DUCKPR_APP_ID }}
          private-key: ${{ secrets.DUCKPR_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write
          permission-checks: read
          permission-actions: read

      - name: Setup Node.js for OpenCodeReview
        if: matrix.reviewer == 'ocr' && inputs.pr_number != '0' && inputs.trigger_event != 'duckpr_installation_test'
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install OpenCodeReview
        if: matrix.reviewer == 'ocr' && inputs.pr_number != '0' && inputs.trigger_event != 'duckpr_installation_test'
        env:
          OCR_NO_UPDATE: "1"
        run: |
          set -euo pipefail
          npm install -g @alibaba-group/open-code-review@1.6.5
          command -v ocr
          if ! ocr --version >/tmp/ocr-version.log 2>&1 && \
             ! ocr version >>/tmp/ocr-version.log 2>&1 && \
             ! ocr --help >>/tmp/ocr-version.log 2>&1; then
            cat /tmp/ocr-version.log
            echo "::error::OpenCodeReview installed, but the ocr binary did not respond to version or help commands."
            exit 1
          fi

      - name: Configure OpenCodeReview
        if: matrix.reviewer == 'ocr' && inputs.pr_number != '0' && inputs.trigger_event != 'duckpr_installation_test'
        env:
          OCR_BASE_URL: ${{ inputs.llm_base_url || vars.LLM_BASE_URL || vars.ANTHROPIC_BASE_URL }}
          OCR_AUTH_TOKEN: ${{ secrets.LLM_API_KEY || secrets.ANTHROPIC_AUTH_TOKEN || secrets.ANTHROPIC_API_KEY }}
          OCR_MODEL: ${{ inputs.model }}
          OCR_NO_UPDATE: "1"
          HOME: ${{ runner.temp }}/ocr-home
        run: |
          set -euo pipefail
          mkdir -p "${HOME}"

          if [ -z "${OCR_BASE_URL}" ]; then
            echo "::error::OpenCodeReview requires llm_base_url, vars.LLM_BASE_URL, or vars.ANTHROPIC_BASE_URL."
            exit 1
          fi
          if [ -z "${OCR_AUTH_TOKEN}" ]; then
            echo "::error::OpenCodeReview requires LLM_API_KEY, ANTHROPIC_AUTH_TOKEN, or ANTHROPIC_API_KEY."
            exit 1
          fi
          if [ -z "${OCR_MODEL}" ]; then
            echo "::error::OpenCodeReview requires a model input."
            exit 1
          fi

          echo "::add-mask::${OCR_AUTH_TOKEN}"

          ocr_model="${OCR_MODEL}"
          if [[ "${ocr_model}" == anthropic/* ]]; then
            ocr_model="${ocr_model#anthropic/}"
          fi

          ocr_url="${OCR_BASE_URL%/}"
          if [[ "${ocr_url}" == */v1/messages ]]; then
            :
          elif [[ "${ocr_url}" == */v1 ]]; then
            ocr_url="${ocr_url}/messages"
          elif [[ "${ocr_url}" == */messages ]]; then
            ocr_url="${ocr_url%/messages}/v1/messages"
          else
            ocr_url="${ocr_url}/v1/messages"
          fi

          ocr config set llm.url "${ocr_url}"
          ocr config set llm.auth_token "${OCR_AUTH_TOKEN}"
          ocr config set llm.model "${ocr_model}"
          ocr config set llm.use_anthropic true
          ocr config set llm.extra_body '{"thinking":{"type":"disabled"}}'
          ocr config set language Chinese

          echo "opencodereview_model=${ocr_model}"

      - name: Get OpenCodeReview PR context
        id: ocr-context
        if: matrix.reviewer == 'ocr' && inputs.pr_number != '0' && inputs.trigger_event != 'duckpr_installation_test'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.duckpr-token.outputs.token }}
          script: |
            const prNumber = Number(process.env.INPUT_PR_NUMBER);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              throw new Error(`Invalid PR number: ${process.env.INPUT_PR_NUMBER}`);
            }

            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput("base_ref", pullRequest.base.ref);
            core.setOutput("head_sha", process.env.INPUT_HEAD_SHA || pullRequest.head.sha);
            core.setOutput("title", pullRequest.title || "");
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.head_sha }}

      - name: Fetch OpenCodeReview refs
        if: matrix.reviewer == 'ocr' && inputs.pr_number != '0' && inputs.trigger_event != 'duckpr_installation_test'
        env:
          OCR_BASE_REF: ${{ steps.ocr-context.outputs.base_ref }}
          OCR_HEAD_SHA: ${{ steps.ocr-context.outputs.head_sha }}
          OCR_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          git fetch origin "+refs/heads/${OCR_BASE_REF}:refs/remotes/origin/${OCR_BASE_REF}"
          git fetch origin "pull/${OCR_PR_NUMBER}/head" || true
          git cat-file -e "${OCR_HEAD_SHA}^{commit}"

      - name: Run OpenCodeReview
        if: matrix.reviewer == 'ocr' && inputs.pr_number != '0' && inputs.trigger_event != 'duckpr_installation_test'
        timeout-minutes: 20
        env:
          OCR_BASE_REF: ${{ steps.ocr-context.outputs.base_ref }}
          OCR_HEAD_SHA: ${{ steps.ocr-context.outputs.head_sha }}
          OCR_PR_TITLE: ${{ steps.ocr-context.outputs.title }}
          OCR_NO_UPDATE: "1"
          HOME: ${{ runner.temp }}/ocr-home
        run: |
          set -euo pipefail
          echo "Reviewing ${OCR_HEAD_SHA} against origin/${OCR_BASE_REF}"

          set +e
          ocr review \
            --from "origin/${OCR_BASE_REF}" \
            --to "${OCR_HEAD_SHA}" \
            --format json \
            --background "${OCR_PR_TITLE}" \
            > /tmp/ocr-result.json 2>/tmp/ocr-stderr.log
          status=$?
          set -e

          echo "${status}" >/tmp/ocr-status
          echo "opencodereview_exit=${status}"
          echo "opencodereview_result_bytes=$(wc -c </tmp/ocr-result.json | tr -d ' ')"
          echo "opencodereview_stderr_bytes=$(wc -c </tmp/ocr-stderr.log | tr -d ' ')"
          if [ -s /tmp/ocr-stderr.log ]; then
            echo "::notice::OpenCodeReview wrote stderr; raw stderr is suppressed to avoid leaking provider diagnostics."
          fi

      - name: Post OpenCodeReview PR review
        if: matrix.reviewer == 'ocr' && inputs.pr_number != '0' && inputs.trigger_event != 'duckpr_installation_test'
        uses: actions/github-script@v7
        env:
          OCR_PR_NUMBER: ${{ inputs.pr_number }}
          OCR_HEAD_SHA: ${{ steps.ocr-context.outputs.head_sha }}
          OCR_MAX_RETRIES: ${{ vars.OCR_MAX_RETRIES }}
          OCR_RETRY_BASE_DELAY: ${{ vars.OCR_RETRY_BASE_DELAY }}
          OCR_RETRY_MAX_DELAY: ${{ vars.OCR_RETRY_MAX_DELAY }}
          OCR_SUCCESS_DELAY: ${{ vars.OCR_SUCCESS_DELAY }}
          OCR_FAILURE_DELAY: ${{ vars.OCR_FAILURE_DELAY }}
          OCR_LOW_REMAINING_THRESHOLD: ${{ vars.OCR_LOW_REMAINING_THRESHOLD }}
          OCR_LOW_REMAINING_SPACING: ${{ vars.OCR_LOW_REMAINING_SPACING }}
          OCR_MAX_SUMMARY_WARNINGS: ${{ vars.OCR_MAX_SUMMARY_WARNINGS }}
          OCR_REVIEWER: ${{ matrix.reviewer }}
          OCR_MODEL: ${{ inputs.model }}
        with:
          github-token: ${{ steps.duckpr-token.outputs.token }}
          script: |
            const fs = require("node:fs");

            const prNumber = Number(process.env.OCR_PR_NUMBER);
            const commitSha = process.env.OCR_HEAD_SHA;
            const resultPath = "/tmp/ocr-result.json";
            const stderrPath = "/tmp/ocr-stderr.log";
            const statusPath = "/tmp/ocr-status";
            const ocrExitCode = Number(readIfExists(statusPath).trim() || "0");
            const reviewIdentity = {
              agentId: process.env.OCR_REVIEWER || "ocr",
              model: process.env.OCR_MODEL || "unknown",
            };

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              throw new Error(`Invalid PR number: ${process.env.OCR_PR_NUMBER}`);
            }
            if (!commitSha) {
              throw new Error("Missing OCR_HEAD_SHA.");
            }

            let result;
            try {
              const raw = fs.readFileSync(resultPath, "utf8").trim();
              result = raw ? JSON.parse(raw) : {};
            } catch (error) {
              const stderrBytes = Buffer.byteLength(readIfExists(stderrPath), "utf8");
              await createSummaryReview(
                `**OpenCodeReview** 无法解析审阅输出。stderr_bytes=${stderrBytes}. ${String(error.message || error)}`
              );
              failIfOcrFailed();
              return;
            }

            const comments = collectComments(result);
            const warnings = collectWarnings(result);

            if (comments.length === 0) {
              const message = result.message || result.summary || "没有生成审阅意见。";
              await createSummaryReview(`**OpenCodeReview**: ${message}${formatWarnings(warnings)}`);
              failIfOcrFailed();
              return;
            }

            const reviewComments = [];
            const summaryComments = [];

            for (const comment of comments) {
              const body = formatComment(comment);
              const hasPath = Boolean(comment.path);
              const line = lineNumber(comment.end_line) || lineNumber(comment.start_line);
              const hasValidLine = Number.isInteger(line) && line >= 1;

              if (!hasPath || !hasValidLine) {
                summaryComments.push({ comment, body, reason: !hasPath ? "缺少文件路径" : "缺少行号" });
                continue;
              }

              const reviewComment = {
                path: comment.path,
                body,
              };

              if (
                lineNumber(comment.start_line) >= 1 &&
                lineNumber(comment.end_line) >= 1 &&
                lineNumber(comment.start_line) !== lineNumber(comment.end_line)
              ) {
                reviewComment.start_line = lineNumber(comment.start_line);
                reviewComment.line = lineNumber(comment.end_line);
                reviewComment.start_side = "RIGHT";
                reviewComment.side = "RIGHT";
              } else {
                reviewComment.line = line;
                reviewComment.side = "RIGHT";
              }

              reviewComments.push({ comment, reviewComment });
            }

            const baseSummary = buildSummaryBody(comments.length, reviewComments.length, summaryComments.length, warnings);
            const summaryBody = baseSummary + formatSummaryComments(summaryComments);

            if (reviewComments.length === 0) {
              await createSummaryReview(summaryBody);
              failIfOcrFailed();
              return;
            }

            try {
              const response = await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: commitSha,
                body: prependReviewIdentityHeader(summaryBody),
                event: "COMMENT",
                comments: reviewComments.map(({ reviewComment }) => reviewComment),
              });
              logRateLimitQuota(response, "after batch createReview");
              failIfOcrFailed();
              return;
            } catch (error) {
              console.log(`Batch createReview failed: ${error.message}`);
              const retry = computeRetryDelayMs(error, 0);
              if (retry) {
                console.log(`Cooling down ${retry.delayMs}ms after batch failure (${retry.source}: ${retry.detail}).`);
                await sleep(retry.delayMs);
              } else {
                const failedComments = reviewComments.map(({ comment }) => ({ comment, error: error.message }));
                let fallbackBody = buildSummaryBody(
                  comments.length,
                  0,
                  summaryComments.length + failedComments.length,
                  warnings
                );
                fallbackBody += formatSummaryComments(summaryComments);
                fallbackBody += formatFailedInlineComments(failedComments);
                await createSummaryReview(fallbackBody);
                failIfOcrFailed();
                return;
              }
            }

            const maxRetries = parseInt(process.env.OCR_MAX_RETRIES, 10) || 3;
            const successDelay = parseInt(process.env.OCR_SUCCESS_DELAY, 10) || 2000;
            const failureDelay = parseInt(process.env.OCR_FAILURE_DELAY, 10) || 1000;
            const lowRemainingThreshold = parseInt(process.env.OCR_LOW_REMAINING_THRESHOLD, 10) || 3;
            const lowRemainingSpacing = parseInt(process.env.OCR_LOW_REMAINING_SPACING, 10) || 10000;

            let successCount = 0;
            const failedComments = [];

            for (const { comment, reviewComment } of reviewComments) {
              let posted = false;
              for (let attempt = 0; attempt <= maxRetries && !posted; attempt++) {
                try {
                  const response = await github.rest.pulls.createReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    commit_id: commitSha,
                    body: "",
                    event: "COMMENT",
                    comments: [reviewComment],
                  });
                  successCount++;
                  posted = true;
                  const remaining = logRateLimitQuota(response, `after ${reviewComment.path}`);
                  const lowQuota = remaining != null && remaining <= lowRemainingThreshold;
                  await sleep(lowQuota ? lowRemainingSpacing : successDelay);
                } catch (error) {
                  const retry = computeRetryDelayMs(error, attempt);
                  const willRetry = retry != null && attempt < maxRetries;
                  if (willRetry) {
                    console.log(
                      `Retrying ${reviewComment.path} after ${retry.delayMs}ms ` +
                      `(HTTP ${error.status || "n/a"}, ${retry.source}: ${retry.detail}).`
                    );
                    await sleep(retry.delayMs);
                    continue;
                  }

                  failedComments.push({ comment, error: error.message });
                  await sleep(retry ? successDelay : failureDelay);
                  break;
                }
              }
            }

            let finalBody = buildSummaryBody(
              comments.length,
              successCount,
              summaryComments.length + failedComments.length,
              warnings
            );
            finalBody += formatSummaryComments(summaryComments);

            finalBody += formatFailedInlineComments(failedComments);

            await createSummaryReview(finalBody);
            failIfOcrFailed();

            async function createSummaryReview(body) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: commitSha,
                body: prependReviewIdentityHeader(body),
                event: "COMMENT",
              });
            }

            function prependReviewIdentityHeader(body) {
              const reviewBody = String(body || "");
              if (/^\s*\*\*DuckPR (?:reviewer|审阅器):\*\*/.test(reviewBody)) return reviewBody;
              return buildReviewIdentityHeader() + reviewBody;
            }

            function buildReviewIdentityHeader() {
              return (
                `**DuckPR 审阅器:** ${inlineCode(reviewIdentity.agentId)}\n` +
                `**模型:** ${inlineCode(reviewIdentity.model)}\n\n`
              );
            }

            function inlineCode(value) {
              const text = String(value || "unknown").trim() || "unknown";
              if (text.includes("`")) return text;
              return `\`${text}\``;
            }

            function failIfOcrFailed() {
              if (ocrExitCode !== 0) {
                core.setFailed(`OpenCodeReview exited with status ${ocrExitCode}.`);
              }
            }

            function collectComments(value) {
              const source = Array.isArray(value)
                ? value
                : firstArray(value, ["comments", "reviews", "suggestions", "findings", "issues"]);
              return source.map(normalizeComment).filter((comment) => comment.content || comment.suggestion_code);
            }

            function firstArray(value, keys) {
              for (const key of keys) {
                if (Array.isArray(value?.[key])) return value[key];
              }
              return [];
            }

            function normalizeComment(raw) {
              const startLine =
                raw.start_line ?? raw.startLine ?? raw.line_start ?? raw.lineStart ?? raw.line ?? raw.position;
              const endLine =
                raw.end_line ?? raw.endLine ?? raw.line_end ?? raw.lineEnd ?? raw.line ?? raw.position;
              return {
                path: raw.path ?? raw.file_path ?? raw.filePath ?? raw.file ?? raw.filename ?? "",
                start_line: lineNumber(startLine),
                end_line: lineNumber(endLine),
                content: String(raw.content ?? raw.body ?? raw.message ?? raw.comment ?? raw.description ?? ""),
                suggestion_code: raw.suggestion_code ?? raw.suggestionCode ?? raw.suggestion ?? "",
                existing_code: raw.existing_code ?? raw.existingCode ?? raw.original_code ?? raw.originalCode ?? "",
              };
            }

            function collectWarnings(value) {
              const warnings = value?.warnings;
              if (!Array.isArray(warnings)) return [];
              return warnings.map(formatWarning).filter(Boolean);
            }

            function formatWarnings(warnings) {
              if (warnings.length === 0) return "";
              const maxShown = parseNonNegativeInt(process.env.OCR_MAX_SUMMARY_WARNINGS, 0);
              const shown = warnings.slice(0, maxShown);
              const hiddenCount = warnings.length - shown.length;
              let body = `\n\nOpenCodeReview 报告了 ${warnings.length} 条警告。`;
              if (shown.length > 0) {
                body += `\n${shown.map((warning) => `- ${warning}`).join("\n")}`;
              }
              if (hiddenCount > 0) {
                body += shown.length > 0
                  ? `\n- 另有 ${hiddenCount} 条警告已从此 PR 摘要中隐藏。`
                  : " 详情已从此 PR 摘要中隐藏。";
              }
              return body;
            }

            function formatWarning(warning) {
              if (warning == null) return "";
              if (typeof warning === "string") return compactText(warning);
              if (typeof warning === "number" || typeof warning === "boolean") return String(warning);
              if (typeof warning !== "object") return compactText(String(warning));

              const type = warningField(warning.type ?? warning.kind ?? warning.level) || "warning";
              const file = warningField(warning.file ?? warning.path ?? warning.filename);
              const message = warningField(
                warning.message ?? warning.error ?? warning.reason ?? warning.detail ?? warning.details
              );

              if (message) {
                return compactText(`${type ? `[${type}] ` : ""}${file ? `${inlineCode(file)}: ` : ""}${message}`);
              }

              try {
                return compactText(JSON.stringify(warning));
              } catch {
                return compactText(String(warning));
              }
            }

            function warningField(value) {
              if (value == null) return "";
              if (typeof value === "string") return value.trim();
              if (typeof value === "number" || typeof value === "boolean") return String(value);
              try {
                return JSON.stringify(value);
              } catch {
                return String(value);
              }
            }

            function buildSummaryBody(totalCount, inlineCount, summaryCount, warnings) {
              let body = `**OpenCodeReview** 在这个 PR 中发现 **${totalCount}** 个问题。`;
              body += `\n- ${inlineCount} 条已作为行内评论发布`;
              body += `\n- ${summaryCount} 条显示在此摘要中`;
              body += formatWarnings(warnings);
              return body;
            }

            function formatSummaryComments(summaryComments) {
              let body = "";
              for (const { comment, reason } of summaryComments) {
                body += "\n\n---\n\n";
                body += formatCommentMarkdown(comment, reason ? `由于${reason}，此评论显示在摘要中。` : "");
              }
              return body;
            }

            function formatFailedInlineComments(failedComments) {
              if (failedComments.length === 0) return "";
              const maxSummaryFailures = 10;
              let body = "\n\n---\n\n### 无法发布为行内评论的审阅意见";
              const shown = failedComments.slice(0, maxSummaryFailures);
              for (const { comment, error } of shown) {
                body += "\n\n---\n\n";
                body += formatCommentMarkdown(comment, `GitHub 无法发布这条行内评论：${error}`);
              }
              if (failedComments.length > maxSummaryFailures) {
                body += `\n\n另有 ${failedComments.length - maxSummaryFailures} 条行内评论。`;
              }
              return body;
            }

            function formatComment(comment) {
              let body = comment.content || "";
              if (comment.suggestion_code && comment.existing_code) {
                body += "\n\n**建议修改:**\n";
                body += fencedBlock(comment.suggestion_code, "suggestion");
              }
              return body || String(comment.suggestion_code || "");
            }

            function formatCommentMarkdown(comment, note) {
              let md = `### \`${comment.path || "未知路径"}\``;
              if (lineNumber(comment.start_line) && lineNumber(comment.end_line)) {
                md += ` (L${comment.start_line}-L${comment.end_line})`;
              }
              md += "\n\n";
              if (note) md += `${note}\n\n`;
              md += comment.content || "";

              if (comment.suggestion_code && comment.existing_code) {
                md += "\n\n<details><summary>建议修改</summary>\n\n";
                md += "**修改前:**\n" + fencedBlock(comment.existing_code) + "\n\n";
                md += "**修改后:**\n" + fencedBlock(comment.suggestion_code) + "\n\n";
                md += "</details>";
              }

              return md;
            }

            function lineNumber(value) {
              const parsed = Number(value);
              return Number.isInteger(parsed) && parsed >= 1 ? parsed : undefined;
            }

            function parseNonNegativeInt(value, fallback) {
              const parsed = Number(value);
              return Number.isInteger(parsed) && parsed >= 0 ? parsed : fallback;
            }

            function compactText(value, maxLength = 300) {
              const text = String(value || "").replace(/\s+/g, " ").trim();
              return text.length <= maxLength ? text : `${text.slice(0, maxLength - 3)}...`;
            }

            function readIfExists(path) {
              try {
                return fs.readFileSync(path, "utf8");
              } catch {
                return "";
              }
            }

            function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            function getHeader(headers, name) {
              const value = headers?.[name] ?? headers?.[name.toLowerCase()];
              return value != null ? String(value).trim() : undefined;
            }

            function computeRetryDelayMs(error, attempt) {
              if (!error) return null;
              const status = error.status;
              const message = String(error.message || "");
              const isRateLimit = status === 429 || (status === 403 && /rate limit|abuse|secondary/i.test(message));
              const isTransient = (status >= 500 && status < 600) || status === 408;
              if (!isRateLimit && !isTransient) return null;

              const headers = error.response?.headers || {};
              const header = (name) => getHeader(headers, name);
              const cap = parseInt(process.env.OCR_RETRY_MAX_DELAY, 10) || 300000;
              const base = parseInt(process.env.OCR_RETRY_BASE_DELAY, 10) || 60000;
              let info = null;

              if (isRateLimit) {
                const retryAfter = header("retry-after");
                if (retryAfter) {
                  const seconds = Number(retryAfter);
                  if (!Number.isNaN(seconds) && seconds >= 0) {
                    info = { rawMs: seconds * 1000, source: "retry-after", detail: `${seconds}s` };
                  } else {
                    const dateMs = Date.parse(retryAfter);
                    if (!Number.isNaN(dateMs)) {
                      info = { rawMs: Math.max(0, dateMs - Date.now()), source: "retry-after-date", detail: retryAfter };
                    }
                  }
                }

                const remaining = header("x-ratelimit-remaining");
                const reset = header("x-ratelimit-reset");
                if (!info && reset != null && Number(remaining) === 0) {
                  const nowSec = Math.floor(Date.now() / 1000);
                  info = {
                    rawMs: Math.max(0, Number(reset) - nowSec) * 1000,
                    source: "x-ratelimit-reset",
                    detail: `reset=${reset}`,
                  };
                }

                if (!info) {
                  info = {
                    rawMs: Math.min(base * Math.pow(2, attempt), cap) + Math.floor(Math.random() * 1000),
                    source: "exponential-backoff",
                    detail: `attempt=${attempt}`,
                  };
                }
              } else {
                info = {
                  rawMs: Math.min(2000 * Math.pow(2, attempt), cap) + Math.floor(Math.random() * 1000),
                  source: "transient-backoff",
                  detail: `HTTP ${status}`,
                };
              }

              return { delayMs: Math.min(info.rawMs, cap), source: info.source, detail: info.detail };
            }

            function logRateLimitQuota(response, tag) {
              const headers = response?.headers || {};
              const remaining = getHeader(headers, "x-ratelimit-remaining");
              const limit = getHeader(headers, "x-ratelimit-limit");
              const reset = getHeader(headers, "x-ratelimit-reset");
              if (remaining != null) {
                console.log(`[rate-limit] ${tag}: remaining=${remaining}/${limit || "?"}${reset ? ` reset=${reset}` : ""}`);
              }
              return remaining != null ? Number(remaining) : null;
            }

            function fencedBlock(content, language = "") {
              const text = String(content || "");
              const fence = safeFence(text);
              let block = fence + language + "\n" + text;
              if (!text.endsWith("\n")) block += "\n";
              return block + fence;
            }

            function safeFence(content) {
              const matches = String(content || "").match(/`+/g) || [];
              const maxTicks = matches.reduce((max, ticks) => Math.max(max, ticks.length), 0);
              return "`".repeat(Math.max(3, maxTicks + 1));
            }

      - name: Run private Pullfrog review
        if: matrix.reviewer != 'ocr'
        uses: ./.duckpr/pullfrog-private
        with:
          prompt: ${{ inputs.prompt }}
          model: ${{ inputs.model }}
          token: ${{ steps.duckpr-token.outputs.token }}
          push: disabled
        env:
          # DuckPR passes llm_base_url when it dispatches the workflow. Keep
          # Actions variable fallbacks for manual workflow_dispatch runs.
          LLM_BASE_URL: ${{ inputs.llm_base_url || vars.LLM_BASE_URL || vars.ANTHROPIC_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY || secrets.ANTHROPIC_AUTH_TOKEN || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ inputs.llm_base_url || vars.LLM_BASE_URL || vars.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.LLM_API_KEY || secrets.ANTHROPIC_AUTH_TOKEN || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PULLFROG_MODEL: ${{ inputs.model }}
          PULLFROG_AGENT: ${{ matrix.reviewer }}
          LOG_LEVEL: info
          PULLFROG_SELF_HOSTED: "1"
          PULLFROG_FORCE_LOCAL_CLI: "1"
